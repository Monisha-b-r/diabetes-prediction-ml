<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Diabetes Prediction</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f2f4f7;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .container {
        background: white;
        padding: 30px;
        width: 380px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        border-radius: 12px;
      }

      h2 {
        text-align: center;
        color: #333;
        margin-bottom: 20px;
      }

      label {
        font-weight: bold;
        color: #444;
      }

      input[type="text"] {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 15px;
      }

      input[type="submit"] {
        width: 100%;
        padding: 12px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
      }

      input[type="submit"]:hover {
        background: #0056b3;
      }

      .prediction {
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
        font-weight: bold;
        color: green;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Enter Patient Details</h2>

      <form method="post" action="/predict">
        <label>Number of Pregnancies:</label>
        <input
          type="text"
          name="num_preg"
          placeholder="e.g., 2"
          value="{{ form_data.num_preg if form_data else '' }}"
        />

        <label>Glucose Concentration:</label>
        <input
          type="text"
          name="glucose_conc"
          placeholder="e.g., 120"
          value="{{ form_data.glucose_conc if form_data else '' }}"
        />

        <label>Diastolic Blood Pressure:</label>
        <input
          type="text"
          name="diastolic_bp"
          placeholder="e.g., 70"
          value="{{ form_data.diastolic_bp if form_data else '' }}"
        />

        <label>Insulin:</label>
        <input
          type="text"
          name="insulin"
          placeholder="e.g., 94"
          value="{{ form_data.insulin if form_data else '' }}"
        />

        <label>BMI:</label>
        <input
          type="text"
          name="bmi"
          placeholder="e.g., 30.5"
          value="{{ form_data.bmi if form_data else '' }}"
        />

        <label>Diabetes Pedigree Function:</label>
        <input
          type="text"
          name="diab_pred"
          placeholder="e.g., 0.372"
          value="{{ form_data.diab_pred if form_data else '' }}"
        />

        <label>Age:</label>
        <input
          type="text"
          name="age"
          placeholder="e.g., 33"
          value="{{ form_data.age if form_data else '' }}"
        />

        <label>Skin Thickness:</label>
        <input
          type="text"
          name="skin"
          placeholder="e.g., 20"
          value="{{ form_data.skin if form_data else '' }}"
        />

        <input type="submit" value="Predict" />
      </form>

      {% if prediction_text %}
      <div class="prediction">{{ prediction_text }}</div>
      {% endif %}
    </div>
  </body>
</html>
